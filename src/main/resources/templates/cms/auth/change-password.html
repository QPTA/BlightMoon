<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8" />
  <title>Đổi mật khẩu</title>

  <link rel="stylesheet" th:href="@{/css/auth/change-pass.css}">
</head>

<body>
  <div class="bg-image"></div>

  <div th:replace="~{cms/fragments/header :: header}"></div>

  <div class="layouts">

    <!-- SIDEBAR -->
    <div sec:authorize="hasRole('ADMIN')" th:replace="~{cms/fragments/admin-sidebar :: sidebar}"></div>

    <div sec:authorize="hasRole('STAFF')" th:replace="~{cms/fragments/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content-wrapper">


      <main class="section-dark">


        <div class="register-card">

          <h2 class="register-title">Đổi mật khẩu</h2>

          <!-- MESSAGE -->
          <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
          </p>

          <p class="success-message" th:if="${successMessage}" th:text="${successMessage}">
          </p>

          <!-- FORM -->
          <form th:action="@{/user/moonblight/change-password}" th:object="${changePasswordRequest}" method="post">

            <!-- OLD PASSWORD -->
            <div class="register-group">
              <label>Mật khẩu hiện tại</label>
              <input type="password" th:field="*{oldPassword}" required />

              <div class="error-message" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}">
              </div>
            </div>

            <!-- NEW PASSWORD -->
            <div class="register-group">
              <label>Mật khẩu mới</label>
              <input type="password" th:field="*{newPassword}" required />

              <div class="error-message" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">
              </div>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="register-group">
              <label>Xác nhận mật khẩu mới</label>
              <input type="password" th:field="*{confirmPassword}" required />

              <div class="error-message" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">
              </div>
            </div>

            <button class="register-btn" type="submit">
              Đổi mật khẩu
            </button>

          </form>

        </div>

      </main>
    </div>
  </div>


</body>

</html>
