<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Quên mật khẩu</title>

  <link rel="stylesheet" th:href="@{/css/auth.css}">

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Cormorant+Garamond+Decorative:wght@700&family=Crimson+Text:wght@400;600&display=swap"
    rel="stylesheet">
</head>

<body>

  <div class="bg-image"></div>

  <div class="layouts">
    <div class="register-card">

      <div class="register-eyebrow">
        MOONBLIGHT ACCOUNT
      </div>

      <h2 class="register-title">Quên mật khẩu</h2>

      <div class="register-divider"></div>

      <!-- error -->
      <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}"></p>

      <!-- form -->
      <form th:action="@{/user/moonblight/forgot-password}" th:object="${forgotPasswordRequest}" method="post">

        <div class="register-group">
          <label>Email</label>
          <input type="email" th:field="*{email}" required />

          <div class="error-message" th:if="${#fields.hasErrors('email')}" th:text="${#fields.errors('email')[0]}">
          </div>
        </div>

        <button class="register-btn" type="submit">
          Gửi mã OTP
        </button>
      </form>

      <hr style="margin: 1rem 0; opacity: 0.2;" />

      <a class="register-link" th:href="@{/user/moonblight/login}">
        Đã có tài khoản? Đăng nhập
      </a>

      <a class="register-link" th:href="@{/user/moonblight/register}">
        Tạo tài khoản mới
      </a>

    </div>
  </div>

</body>

</html>
