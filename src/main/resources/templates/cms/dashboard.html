<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    
    <!-- Sau sẽ ném vào .css -->
    <style>
      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }
      .stat-card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
        background: #fff;
      }
      .stat-card h2 {
        margin: 0;
        font-size: 2rem;
      }
      .stat-card p {
        margin-top: 10px;
        color: #666;
      }
      .alert-card {
        margin-top: 30px;
        padding: 20px;
        border: 1px solid #f0ad4e;
        background: #fff8e1;
        border-radius: 8px;
      }
      .quick-actions {
        margin-top: 30px;
      }
      .quick-actions a {
        display: inline-block;
        margin-right: 10px;
        margin-bottom: 10px;
        padding: 10px 16px;
        text-decoration: none;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
    </style>
  </head>

  <body>
    <div class="layout">
      <th:block th:replace="~{cms/fragments/sidebar :: sidebar}"></th:block>

      <div class="content-wrapper">
        <th:block th:replace="~{cms/fragments/header :: header}"></th:block>

        <main style="padding: 20px">
          <h1>Dashboard</h1>

          <p>Chào mừng đến với Moon Blight CMS.</p>

          <div class="dashboard-grid">
            <div class="stat-card">
              <h2 th:text="${articleCount}">0</h2>
              <p>Articles</p>
            </div>

            <div class="stat-card">
              <h2 th:text="${storyCount}">0</h2>
              <p>Stories</p>
            </div>

            <div class="stat-card">
              <h2 th:text="${worldCount}">0</h2>
              <p>Worlds</p>
            </div>

            <div class="stat-card">
              <h2 th:text="${characterCount}">0</h2>
              <p>Characters</p>
            </div>

            <div class="stat-card">
              <h2 th:text="${faqCount}">0</h2>
              <p>FAQs</p>
            </div>

            <div class="stat-card">
              <h2 th:text="${unprocessedContactCount}">0</h2>
              <p>Chưa xử lý</p>
            </div>
          </div>

          <div class="alert-card" th:if="${unprocessedContactCount > 0}">
            <strong>Cần chú ý:</strong>

            Có
            <span th:text="${unprocessedContactCount}"></span>
            tin nhắn liên hệ chưa được xử lý.
          </div>

          <div class="quick-actions">
            <h2>Truy cập nhanh</h2>

            <a th:href="@{/article/moonblight/create}"> Tạo Article </a>

            <a th:href="@{/story/moonblight/create}"> Tạo Story </a>

            <a th:href="@{/world/moonblight/create}"> Tạo World </a>

            <a th:href="@{/character/moonblight/create}"> Tạo Character </a>

            <a th:href="@{/faq/moonblight/create}"> Tạo FAQ </a>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
