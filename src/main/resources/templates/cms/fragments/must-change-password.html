<div
  th:if="${currentUser.mustChangePassword}"
  style="
    background-color: #fff3cd;
    border: 1px solid #ffeeba;
    color: #856404;
    padding: 12px;
    margin-bottom: 16px;
  "
>
  <strong>Cảnh báo bảo mật:</strong>

  Bạn đang sử dụng mật khẩu tạm thời và bắt buộc phải đổi mật khẩu trước khi
  tiếp tục sử dụng hệ thống.

  <a
    th:href="@{/user/moonblight/change-password}"
    style="margin-left: 10px; font-weight: bold"
  >
    Đổi mật khẩu ngay
  </a>
</div>
