<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Danh sách bài viết</title>

    <style>
      table {
        border-collapse: collapse;
        width: 100%;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: left;
      }

      img {
        max-width: 200px;
        max-height: 120px;
      }
    </style>
    <!-- outer css -->
    <!-- common css -->
    <link rel="stylesheet" th:href="@{/css/component/header.css}" />
    <link rel="stylesheet" th:href="@{/css/component/footer.css}" />
    <!-- article css -->
    <link rel="stylesheet" th:href="@{/css/cms/article/article-list.css}" />
  </head>
  <body>
    <div class="layout">
      <th:block th:replace="~{cms/fragments/sidebar :: sidebar}"> </th:block>
      <div class="content-wrapper">
        <th:block th:replace="~{cms/fragments/header :: header}"></th:block>
        <main>
          <h1>Danh sách bài viết</h1>
          <a th:href="@{/article/moonblight/create}"> Tạo bài viết </a>
          <br />
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Thumbnail</th>
                <th>Tiêu đề</th>
                <th>Tác giả</th>
                <th>Loại</th>
                <th>Ngày tạo</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="article : ${articles.content}">
                <td th:text="${article.id}"></td>

                <td>
                  <img
                    th:if="${not #strings.isEmpty(article.thumbnailUrl)}"
                    th:src="${article.thumbnailUrl}"
                    th:alt="${article.title}"
                  />
                </td>

                <td th:text="${article.title}"></td>

                <td th:text="${article.authorUsername}"></td>

                <td th:text="${article.type}"></td>

                <td th:text="${article.createdAt}"></td>

                <td
                  th:text="${article.deleted ? 'Đã xóa' : 'Đang hiển thị'}"
                ></td>

                <td>
                  <form
                    th:action="@{/article/moonblight/{id}/edit(id=${article.id})}"
                    method="get"
                  >
                    <button type="submit">Sửa</button>
                  </form>

                  <form
                    th:if="${!article.deleted}"
                    th:action="@{/article/moonblight/{id}/delete(id=${article.id})}"
                    method="post"
                    style="display: inline"
                  >
                    <button
                      type="submit"
                      onclick="
                        return confirm(
                          'Bạn có chắc chắn muốn xóa bài viết này không?',
                        );
                      "
                    >
                      Xóa
                    </button>
                  </form>

                  <form
                    th:if="${article.deleted}"
                    th:action="@{/article/moonblight/{id}/restore(id=${article.id})}"
                    method="post"
                    style="display: inline"
                  >
                    <button
                      type="submit"
                      onclick="return confirm('Khôi phục bài viết này?');"
                    >
                      Kích hoạt lại
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
          <br />

          <div th:if="${articles.totalPages > 1}">
            <a
              th:if="${!articles.first}"
              th:href="@{/article/moonblight/list(page=${articles.number - 1})}"
            >
              ← Trước
            </a>

            <span
              th:each="i : ${#numbers.sequence(0, articles.totalPages - 1)}"
            >
              <a
                th:if="${i != articles.number}"
                th:href="@{/article/moonblight/list(page=${i})}"
                th:text="${i + 1}"
              ></a>

              <span
                th:if="${i == articles.number}"
                th:text="${i + 1}"
                style="font-weight: bold"
              ></span>
            </span>

            <a
              th:if="${!articles.last}"
              th:href="@{/article/moonblight/list(page=${articles.number + 1})}"
            >
              Sau →
            </a>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
