<!doctype html>

<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Cập nhật bài viết</title>
    <link
      href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <!-- common css -->
    <link rel="stylesheet" th:href="@{/css/component/header.css}" />
    <link rel="stylesheet" th:href="@{/css/component/footer.css}" />
    <!-- article css -->
    <link rel="stylesheet" th:href="@{/css/cms/article/article-edit.css}" />
  </head>

  <body>
    <div class="layout">
      <th:block th:replace="~{cms/fragments/sidebar :: sidebar}"> </th:block>

      ```
      <div class="content-wrapper">
        <th:block th:replace="~{cms/fragments/header :: header}"> </th:block>

        <main>
          <h1>Cập nhật bài viết</h1>

          <p
            style="color: green"
            th:if="${successMessage}"
            th:text="${successMessage}"
          ></p>

          <p
            style="color: red"
            th:if="${errorMessage}"
            th:text="${errorMessage}"
          ></p>

          <form
            th:action="@{/article/moonblight/{id}/edit(id=${article.id})}"
            th:object="${article}"
            method="post"
            enctype="multipart/form-data"
          >
            <div>
              <label>Tiêu đề</label><br />

              <input type="text" th:field="*{title}" maxlength="255" required />

              <div
                th:if="${#fields.hasErrors('title')}"
                th:errors="*{title}"
                style="color: red"
              ></div>
            </div>

            <br />

            <div>
              <label>Loại bài viết</label><br />

              <select th:field="*{type}" required>
                <option value="">-- Chọn loại bài viết --</option>

                <option
                  th:each="type : ${articleTypes}"
                  th:value="${type}"
                  th:text="${type.displayName}"
                ></option>
              </select>

              <div
                th:if="${#fields.hasErrors('type')}"
                th:errors="*{type}"
                style="color: red"
              ></div>
            </div>

            <br />

            <div>
              <label>Thumbnail hiện tại</label><br />

              <img
                th:if="${article.thumbnailUrl != null}"
                th:src="${article.thumbnailUrl}"
                alt="Thumbnail"
                style="max-width: 200px"
              />
            </div>

            <br />

            <div>
              <label>Thumbnail mới (không bắt buộc)</label><br />

              <input type="file" name="thumbnail" accept="image/*" />
            </div>

            <br />

            <div>
              <label>Nội dung</label><br />

              <!-- Textarea ẩn để Thymeleaf binding dữ liệu xuống Backend -->
              <textarea
                id="content"
                th:field="*{content}"
                style="display: none"
              ></textarea>

              <!-- Vùng hiển thị cho người dùng gõ (Quill sẽ bám vào đây) -->
              <div id="quill-editor" style="height: 300px"></div>

              <div
                th:if="${#fields.hasErrors('content')}"
                th:errors="*{content}"
                style="color: red"
              ></div>
            </div>

            <br />

            <button type="submit">Cập nhật bài viết</button>
          </form>
        </main>
      </div>
    </div>
    ```
    <script th:src="@{/js/editor.js}"></script>
  </body>
</html>
