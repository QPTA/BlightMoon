<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Danh sách nhân vật</title>
  </head>
  <body>
    <div class="layout">
      <th:block th:replace="~{cms/fragments/sidebar :: sidebar}"></th:block>
      <div class="content-wrapper">
        <th:block th:replace="~{cms/fragments/header :: header}"></th:block>
      </div>
      <main>
        <h1>Danh sách nhân vật</h1>

        <p
          style="color: green"
          th:if="${successMessage}"
          th:text="${successMessage}"
        ></p>

        <p
          style="color: red"
          th:if="${errorMessage}"
          th:text="${errorMessage}"
        ></p>

        <a th:href="@{/character/moonblight/create}"> Tạo nhân vật </a>

        <br /><br />

        <table border="1">
          <thead>
            <tr>
              <th>ID</th>
              <th>Ảnh</th>
              <th>Tên</th>
              <th>Chủng tộc</th>
              <th>Ưu tiên</th>
              <th>Trạng thái</th>
              <th>Hành động</th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="character : ${characters.content}">
              <td th:text="${character.id}"></td>

              <td>
                <img
                  th:if="${character.image != null}"
                  th:src="${character.image}"
                  style="max-width: 120px"
                />
              </td>

              <td th:text="${character.name}"></td>

              <td th:text="${character.race}"></td>

              <td th:text="${character.priority}"></td>

              <td
                th:text="${character.deleted ? 'Đã xóa' : 'Đang hiển thị'}"
              ></td>

              <td>
                <form
                  th:action="@{/character/moonblight/{id}/edit(id=${character.id})}"
                  method="get"
                >
                  <button type="submit">Sửa</button>
                </form>

                <form
                  th:if="${!character.deleted}"
                  th:action="@{/character/moonblight/{id}/delete(id=${character.id})}"
                  method="post"
                >
                  <button type="submit">Xóa</button>
                </form>

                <form
                  th:if="${character.deleted}"
                  th:action="@{/character/moonblight/{id}/restore(id=${character.id})}"
                  method="post"
                >
                  <button type="submit">Khôi phục</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
        <br />

        <div th:if="${characters.totalPages > 1}">
          <a
            th:if="${!characters.first}"
            th:href="@{/character/moonblight/list(page=${characters.number - 1})}"
          >
            ← Trước
          </a>

          <span th:each="i : ${#numbers.sequence(0, characters.totalPages - 1)}">
            <a
              th:if="${i != characters.number}"
              th:href="@{/character/moonblight/list(page=${i})}"
              th:text="${i + 1}"
            ></a>

            <span
              th:if="${i == characters.number}"
              th:text="${i + 1}"
              style="font-weight: bold"
            ></span>
          </span>

          <a
            th:if="${!characters.last}"
            th:href="@{/character/moonblight/list(page=${characters.number + 1})}"
          >
            Sau →
          </a>
        </div>
      </main>
    </div>
  </body>
</html>
