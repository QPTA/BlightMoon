<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo Nhân Vật</title>
</head>
<body>

    <h2>Tạo Nhân Vật Mới</h2>

    <div th:if="${errorMessage}" style="color: red; margin-bottom: 15px;">
        <strong th:text="${errorMessage}"></strong>
    </div>

    <form th:action="@{/character/moonblight/create}" method="post" th:object="${createGameCharacterRequest}" enctype="multipart/form-data">
        
        <div style="margin-bottom: 10px;">
            <label>Tên nhân vật:</label><br/>
            <input type="text" th:field="*{name}" />
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: red;"></span>
        </div>

        <div style="margin-bottom: 10px;">
            <label>Chủng tộc:</label><br/>
            <input type="text" th:field="*{race}" />
            <span th:if="${#fields.hasErrors('race')}" th:errors="*{race}" style="color: red;"></span>
        </div>

        <div style="margin-bottom: 10px;">
            <label>Mô tả:</label><br/>
            <textarea th:field="*{description}" rows="4" cols="30"></textarea>
            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" style="color: red;"></span>
        </div>

        <div style="margin-bottom: 10px;">
            <label>Quote:</label><br/>
            <input type="text" th:field="*{quote}" />
            <span th:if="${#fields.hasErrors('quote')}" th:errors="*{quote}" style="color: red;"></span>
        </div>

        <div style="margin-bottom: 10px;">
            <label>Độ ưu tiên (0-100):</label><br/>
            <input type="number" th:field="*{priority}" />
            <span th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}" style="color: red;"></span>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Hình ảnh:</label><br/>
            <input type="file" name="imageFile" accept="image/*" />
        </div>

        <button type="submit">Tạo nhân vật</button>
        <a th:href="@{/character/moonblight/list}" style="margin-left: 10px;">Hủy / Quay lại</a>
        
    </form>

</body>
</html>
