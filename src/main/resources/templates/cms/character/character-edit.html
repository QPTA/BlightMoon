<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật nhân vật</title>
</head>
<body>

<h1>Cập nhật nhân vật</h1>

<p style="color:red"
   th:if="${errorMessage}"
   th:text="${errorMessage}">
</p>

<form
        th:action="@{/character/moonblight/{id}/edit(id=${character.id})}"
        method="post"
        enctype="multipart/form-data">

    <input type="hidden"
           name="image"
           th:value="${character.image}">

    <div>
        <label>Tên</label><br>

        <input type="text"
               name="name"
               th:value="${character.name}">
    </div>

    <br>

    <div>
        <label>Chủng tộc</label><br>

        <input type="text"
               name="race"
               th:value="${character.race}">
    </div>

    <br>

    <div>
        <label>Quote</label><br>

        <input type="text"
               name="quote"
               th:value="${character.quote}">
    </div>

    <br>

    <div>
        <label>Priority</label><br>

        <input type="number"
               name="priority"
               min="0"
               max="100"
               th:value="${character.priority}">
    </div>

    <br>

    <div>

        <label>Ảnh hiện tại</label><br>

        <img
                th:if="${character.image != null}"
                th:src="${character.image}"
                style="max-width:200px">

    </div>

    <br>

    <div>

        <label>Ảnh mới</label><br>

        <input type="file"
               name="imageFile"
               accept="image/*">

    </div>

    <br>

    <div>

        <label>Mô tả</label><br>

        <textarea
                name="description"
                rows="10"
                cols="80"
                th:text="${character.description}">
        </textarea>

    </div>

    <br>

    <button type="submit">
        Cập nhật
    </button>

</form>

</body>
</html>
