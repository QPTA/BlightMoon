<!doctype html>

<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Danh sách thế giới</title>
  </head>
  <body>
    <div class="layout">
      <th:block th:replace="~{cms/fragments/sidebar :: sidebar}"></th:block>

      <div class="content-wrapper">
        <th:block th:replace="~{cms/fragments/header :: header}"></th:block>

        <main>
          <h1>Danh sách thế giới</h1>

          <p
            style="color: green"
            th:if="${successMessage}"
            th:text="${successMessage}"
          ></p>

          <p
            style="color: red"
            th:if="${errorMessage}"
            th:text="${errorMessage}"
          ></p>

          <a th:href="@{/world/moonblight/create}"> Tạo thế giới mới </a>

          <br /><br />

          <table border="1">
            ```
            <thead>
              <tr>
                <th>ID</th>
                <th>Ảnh</th>
                <th>Ưu tiên</th>
                <th>Tag</th>
                <th>Tiêu đề</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="world : ${worlds.content}">
                <td th:text="${world.id}"></td>

                <td>
                  <img
                    th:if="${world.image != null}"
                    th:src="${world.image}"
                    alt="World Image"
                    style="max-width: 120px"
                  />
                </td>

                <td th:text="${world.priority}"></td>

                <td th:text="${world.tag}"></td>

                <td th:text="${world.title}"></td>

                <td
                  th:text="${world.deleted ? 'Đã xóa' : 'Đang hiển thị'}"
                ></td>

                <td>
                  <form
                    th:action="@{/world/moonblight/{id}/edit(id=${world.id})}"
                    method="get"
                  >
                    <button type="submit">Sửa</button>
                  </form>

                  <form
                    th:if="${!world.deleted}"
                    th:action="@{/world/moonblight/{id}/delete(id=${world.id})}"
                    method="post"
                  >
                    <button type="submit">Xóa</button>
                  </form>

                  <form
                    th:if="${world.deleted}"
                    th:action="@{/world/moonblight/{id}/restore(id=${world.id})}"
                    method="post"
                  >
                    <button type="submit">Khôi phục</button>
                  </form>
                </td>
              </tr>
            </tbody>
            ```
          </table>

          <br />

          <div th:if="${worlds.totalPages > 1}">
            <a
              th:if="${!worlds.first}"
              th:href="@{/world/moonblight/list(page=${worlds.number - 1})}"
            >
              ← Trước
            </a>

            <span
              th:each="i : ${#numbers.sequence(0, worlds.totalPages - 1)}"
            >
              <a
                th:if="${i != worlds.number}"
                th:href="@{/world/moonblight/list(page=${i})}"
                th:text="${i + 1}"
              ></a>

              <span
                th:if="${i == worlds.number}"
                th:text="${i + 1}"
                style="font-weight: bold"
              ></span>
            </span>

            <a
              th:if="${!worlds.last}"
              th:href="@{/world/moonblight/list(page=${worlds.number + 1})}"
            >
              Sau →
            </a>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
