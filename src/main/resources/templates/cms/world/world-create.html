<!doctype html>

<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Tạo thế giới</title>
    <!-- outer css -->
    <!-- 1. Nhúng CSS & JS của Quill -->
    <link
      href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
  </head>
  <body>
    <div class="layout">
      <th:block th:replace="~{cms/fragments/sidebar :: sidebar}"> </th:block>

      <div class="content-wrapper">
        <th:block th:replace="~{cms/fragments/header :: header}"> </th:block>

        <main>
          <h1>Tạo thế giới mới</h1>

          <p
            style="color: green"
            th:if="${successMessage}"
            th:text="${successMessage}"
          ></p>

          <p
            style="color: red"
            th:if="${errorMessage}"
            th:text="${errorMessage}"
          ></p>

          <form
            th:action="@{/world/moonblight/create}"
            method="post"
            enctype="multipart/form-data"
            th:object="${createWorldRequest}"
          >
            ```
            <div>
              <label>Tag</label><br />
              <input type="text" th:field="*{tag}" />
            </div>

            <br />

            <div>
              <label>Tiêu đề</label><br />
              <input type="text" th:field="*{title}" required />
            </div>

            <br />

            <div>
              <label>Độ ưu tiên (0 - 100)</label><br />
              <input
                type="number"
                th:field="*{priority}"
                min="0"
                max="100"
                value="50"
              />
            </div>

            <br />

            <div>
              <label>Ảnh</label><br />
              <input type="file" name="imageFile" accept="image/*" />
            </div>

            <br />

            <div>
              <label>Nội dung</label><br />

              <textarea
                id="content"
                th:field="*{content}"
                style="display: none"
              ></textarea>

              <div id="quill-editor"></div>
            </div>

            <br />

            <button type="submit">Tạo thế giới</button>
            ```
          </form>

          <br />

          <a th:href="@{/world/moonblight/list}"> Quay lại danh sách </a>
        </main>
      </div>
    </div>
    <script th:src="@{/js/editor.js}"></script>
  </body>
</html>
